# Render Blueprint (opcional). También puedes configurar todo desde el dashboard.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: api-vania
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SCHEMA
        value: public
      - key: JWT_SECRET
        generateValue: true

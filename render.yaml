# Despliegue unificado: API + Frontend + PostgreSQL desde un solo repo.
# Conecta este repo en Render (Blueprint) y despliega todo con un solo push.
# https://render.com/docs/blueprint-spec

databases:
  - name: vania-db
    databaseName: vania
    plan: free

services:
  # Backend (API)
  - type: web
    name: api-vania
    runtime: node
    rootDir: api-vania
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vania-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend (sitio estático)
  - type: web
    name: sistema-vania
    runtime: static
    rootDir: sistema-vania
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # URL de la API (Render la rellena si existe el servicio api-vania)
      - key: VITE_API_URL
        fromService:
          type: web
          name: api-vania
          envVarKey: RENDER_EXTERNAL_URL
      # Si VITE_API_URL no se rellena automáticamente, añádela a mano en el dashboard
      # con el valor: https://api-vania-xxxx.onrender.com
